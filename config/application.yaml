##
# Matchbox FHIR Server – configured for Swedish Base Profiles validation
# See https://ahdis.github.io/matchbox/ for full documentation
##

spring:
  datasource:
    # H2 in-memory DB (simplest; swap for PostgreSQL via with-postgres example)
    url: jdbc:h2:file:/matchbox/data/matchbox;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driverClassName: org.h2.Driver
  jpa:
    properties:
      hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirH2Dialect
      hibernate.search.enabled: false

hapi:
  fhir:
    ### Implementation Guides to pre-load at startup ############################
    #
    # Matchbox will download these from the FHIR package registry
    # (packages.fhir.org / packages2.fhir.org) on first boot.
    #
    implementationguides:
      # FHIR R4 core (required base dependency)
      fhir_r4_core:
        name: hl7.fhir.r4.core
        version: 4.0.1
        url: classpath:/hl7.fhir.r4.core.tgz

      # HL7 Terminology (required by many IGs)
      fhir_terminology:
        name: hl7.terminology.r4
        version: 6.2.0

      # ─── Swedish Base Profiles ────────────────────────────────────────
      # Published by HL7 Sweden  –  https://hl7.se/fhir/ig/base/
      # Source: https://github.com/HL7Sweden/basprofiler-r4
      # Package on Simplifier: https://simplifier.net/packages/hl7se.fhir.base
      #
      swedish_base:
        name: hl7se.fhir.base
        version: 1.1.0

    ### Server settings ########################################################
    server:
      path: /matchboxv3/fhir
    cors:
      allow_Credentials: true
      allowed_origin:
        - '*'

matchbox:
  fhir:
    context:
      # false  = deployment mode (read-only conformance resources – recommended)
      # true   = development mode (allows POST/PUT of StructureDefinitions etc.)
      onlyOneEngine: false

      # Terminology server used during validation
      txServer: https://tx-nordics.fhir.org

      # Suppress noisy but harmless warnings (optional, tune to taste)
      # suppressWarnInfo:
      #   hl7se.fhir.base#1.1.0:
      #     - "regex:Binding for path (.+) has no source"
